<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <title>Kuis Geografi</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 {
            width: 400px;
            height: 400px;
            background: #f7971e;
            top: -100px;
            left: -100px;
        }
        .orb-2 {
            width: 500px;
            height: 500px;
            background: #ffd200;
            bottom: -150px;
            right: -150px;
        }
        .orb-3 {
            width: 300px;
            height: 300px;
            background: #a855f7;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .container {
            width: 100%;
            max-width: 680px;
            position: relative;
            z-index: 1;
        }

        .quiz-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 32px;
            padding: 35px 30px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7);
            opacity: 0;
            transform: scale(0.95);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -0.5px;
        }
        .header h1 span {
            background: linear-gradient(90deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .badge-round {
            background: rgba(255, 255, 255, 0.12);
            padding: 6px 16px;
            border-radius: 40px;
            color: #ffd700;
            font-weight: 700;
            font-size: 14px;
            border: 1px solid rgba(255, 215, 0, 0.25);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .progress-wrapper {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            height: 8px;
            margin: 18px 0 8px 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            border-radius: 40px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .question-text {
            color: #ffffff;
            font-size: 22px;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 25px;
            min-height: 80px;
            opacity: 0;
            transform: translateX(-20px);
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }
        .option-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.10);
            border-radius: 16px;
            padding: 16px 20px;
            color: #f0f0f0;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            font-family: 'Poppins', sans-serif;
            text-align: left;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
        }
        .option-btn .letter {
            background: rgba(255, 255, 255, 0.08);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #ffd700;
            flex-shrink: 0;
            transition: 0.3s;
        }
        .option-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.30);
            transform: scale(1.02);
        }
        .option-btn.correct {
            background: rgba(74, 222, 128, 0.20);
            border-color: #4ade80;
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.15);
        }
        .option-btn.correct .letter {
            background: #4ade80;
            color: #000;
        }
        .option-btn.wrong {
            background: rgba(248, 113, 113, 0.20);
            border-color: #f87171;
            box-shadow: 0 0 30px rgba(248, 113, 113, 0.15);
        }
        .option-btn.wrong .letter {
            background: #f87171;
            color: #000;
        }
        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .next-btn {
            background: linear-gradient(90deg, #f7971e, #ffd200);
            border: none;
            border-radius: 60px;
            padding: 16px 30px;
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 18px;
            color: #1a1a2e;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.25);
        }
        .next-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(255, 215, 0, 0.40);
        }

        .result-screen {
            text-align: center;
            padding: 20px 0;
            opacity: 0;
            display: none;
        }
        .result-screen .big-icon {
            font-size: 80px;
            margin-bottom: 10px;
        }
        .result-screen h2 {
            color: #fff;
            font-size: 30px;
            font-weight: 800;
        }
        .result-screen .final-score {
            font-size: 60px;
            font-weight: 900;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 5px 0;
        }
        .result-screen .message {
            color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
            margin-bottom: 25px;
        }
        .restart-btn {
            background: rgba(255, 255, 255, 0.12);
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-radius: 60px;
            padding: 14px 40px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .restart-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }

        @media (max-width: 500px) {
            .quiz-card { padding: 25px 18px; }
            .question-text { font-size: 18px; }
            .option-btn { font-size: 15px; padding: 14px 16px; }
            .header h1 { font-size: 18px; }
            .badge-round { font-size: 12px; padding: 4px 12px; }
        }
    </style>
</head>

            { q: "Candi Penataran adalah candi Hindu terbesar di Jawa Timur. Terletak di kota mana?", o: ["Malang", "Surabaya", "Blitar", "Kediri"], a: 2 },
            { q: "Taman Mini Indonesia Indah (TMII) adalah taman budaya di kota mana?", o: ["Bandung", "Bogor", "Jakarta", "Tangerang"], a: 2 },
            { q: "Kota Vatikan adalah negara terkecil di dunia, terletak di dalam kota mana?", o: ["Paris", "London", "Roma", "Madrid"], a: 2 },
            { q: "Piramida Giza adalah satu-satunya dari 7 Keajaiban Dunia Kuno yang masih bertahan. Di negara mana?", o: ["Mesir", "Irak", "Yunani", "Turki"], a: 0 },
            { q: "Garis khatulistiwa melintasi kota Pontianak. Di Indonesia provinsi mana?", o: ["Kalbar", "Kalteng", "Kalsel", "Kaltim"], a: 0 },
            { q: "Gurun Gobi adalah gurun terbesar di Asia, melintasi China dan negara mana?", o: ["Mongolia", "Rusia", "India", "Kazakhstan"], a: 0 },
            { q: "Danau Baikal adalah danau air tawar terdalam di dunia, terletak di negara mana?", o: ["Rusia", "Kazakhstan", "Mongolia", "China"], a: 0 },
            { q: "Air Terjun Angel adalah air terjun tertinggi di dunia (979m), terletak di negara mana?", o: ["Brasil", "Argentina", "Venezuela", "Kolombia"], a: 2 },
            { q: "Selat Gibraltar menghubungkan Samudra Atlantik dengan laut apa?", o: ["Laut Tengah", "Laut Merah", "Laut Kaspia", "Laut Hitam"], a: 0 },
            { q: "Kepulauan Galapagos terkenal dengan satwa endemiknya. Milik negara mana?", o: ["Peru", "Chili", "Ekuador", "Kolombia"], a: 2 },
            { q: "Monte Carlo adalah distrik mewah di negara kecil mana di Eropa?", o: ["Monako", "Luksemburg", "San Marino", "Andorra"], a: 0 },
            { q: "Gunung Kilimanjaro adalah gunung tertinggi di Afrika. Terletak di negara mana?", o: ["Kenya", "Tanzania", "Uganda", "Etiopia"], a: 1 },
            { q: "Menara Allianz Arena adalah stadion sepak bola dengan pencahayaan warna-warni. Terletak di kota Jerman mana?", o: ["Berlin", "Munich", "Dortmund", "Hamburg"], a: 1 },
            { q: "Stadion Maracana adalah stadion sepak bola legendaris di negara mana?", o: ["Argentina", "Brasil", "Uruguay", "Kolombia"], a: 1 },
            { q: "Gedung Chrysler adalah gedung Art Deco ikonik di kota mana?", o: ["New York", "Chicago", "Los Angeles", "Miami"], a: 0 },
            { q: "Pulau Santorini adalah pulau vulkanik indah dengan rumah putih di negara mana?", o: ["Yunani", "Italia", "Spanyol", "Turki"], a: 0 },
            { q: "Taman Nasional Yellowstone adalah taman nasional pertama di dunia, di negara mana?", o: ["Kanada", "Amerika Serikat", "Meksiko", "Kosta Rika"], a: 1 },
            { q: "Jembatan Rialto adalah jembatan tertua di atas Kanal Besar. Terletak di kota Italia mana?", o: ["Roma", "Milan", "Venice", "Florence"], a: 2 },
            { q: "Masjid Nabawi terletak di kota Madinah, di negara mana?", o: ["Arab Saudi", "Yordania", "Mesir", "Suriah"], a: 0 },
            { q: "Candi Sukuh adalah candi yang berbentuk seperti piramida terpotong, terletak di Jawa Tengah dekat kota mana?", o: ["Solo", "Yogyakarta", "Semarang", "Magelang"], a: 0 },
            { q: "Taman Hiburan Disneyland pertama di dunia terletak di negara bagian AS mana?", o: ["Florida", "California", "Texas", "New York"], a: 1 },
            { q: "Kota Tua (Old Town) di Tallinn adalah salah satu kota tua abad pertengahan terbaik di Eropa. Negara mana?", o: ["Estonia", "Latvia", "Lituania", "Finlandia"], a: 0 },
            { q: "Jembatan Golden Gate memiliki warna internasional yang dikenal dengan sebutan?", o: ["Merah", "Orange", "International Orange", "Merah Marun"], a: 2 },
            { q: "Gedung Sydney Opera House diresmikan pada tahun berapa?", o: ["1959", "1969", "1973", "1985"], a: 2 },
            { q: "Candi Borobudur dibangun pada abad ke berapa?", o: ["Abad ke-7", "Abad ke-8", "Abad ke-9", "Abad ke-10"], a: 2 },
            { q: "Burj Khalifa memiliki jumlah lantai sebanyak?", o: ["128", "148", "163", "183"], a: 2 },
            { q: "Masjid Hagia Sophia di Istanbul saat ini berfungsi sebagai?", o: ["Museum", "Masjid", "Gereja", "Sinagog"], a: 1 },
            { q: "Patung Liberty memegang obor di tangan kanan dan apa di tangan kiri?", o: ["Buku", "Mahkota", "Tablet", "Pedang"], a: 2 },
            { q: "Colosseum di Roma mampu menampung sekitar berapa penonton?", o: ["30.000", "50.000", "80.000", "100.000"], a: 1 },
            { q: "Taj Mahal dibangun oleh Kaisar Shah Jahan untuk mengenang siapa?", o: ["Istrinya", "Ibunya", "Ayahnya", "Putranya"], a: 0 },
            { q: "Tembok Besar China memiliki panjang sekitar?", o: ["13.000 km", "21.000 km", "28.000 km", "35.000 km"], a: 1 },
            { q: "Machu Picchu berada di ketinggian berapa meter di atas permukaan laut?", o: ["1.500 m", "2.430 m", "3.200 m", "4.100 m"], a: 1 },
            { q: "Angkor Wat awalnya dibangun sebagai kuil untuk dewa Hindu siapa?", o: ["Siwa", "Wisnu", "Brahma", "Indra"], a: 1 }
        ];

        // ================================================================
        // 🔀 LOGIKA: 10 SOAL PER PUTARAN + ANIME.JS
        // ================================================================
        const QUESTIONS_PER_ROUND = 10;
        let currentRoundQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let isAnswered = false;
        let roundCounter = 1;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // ================================================================
        // 🔧 FUNGSI DEEP COPY (SALINAN DALAM) UNTUK OBJEK SOAL
        // ================================================================
        function deepCopyQuestion(q) {
            return {
                q: q.q,
                o: [...q.o],     // salinan baru array pilihan
                a: q.a
            };
        }

        function startNewRound() {
            // 1. Acak bank soal (hanya urutannya saja, tanpa mengubah objek)
            shuffleArray(masterQuestions);
            
            // 2. Ambil 10 soal pertama, tapi buat SALINAN DALAM dari setiap objek
            //    agar masterQuestions tetap murni dan tidak pernah berubah.
            const rawQuestions = masterQuestions.slice(0, QUESTIONS_PER_ROUND);
            currentRoundQuestions = rawQuestions.map(q => deepCopyQuestion(q));

            // 3. Acak posisi pilihan jawaban di setiap soal (AMAN, karena ini salinan)
            currentRoundQuestions.forEach(q => {
                // Simpan teks jawaban benar SEBELUM diacak
                const correctAnswerText = q.o[q.a];
                
                // Buat pasangan [teks, indeks] lalu acak
                const paired = q.o.map((text, idx) => ({ text, idx }));
                shuffleArray(paired);
                
                // Timpa array o dengan teks yang sudah diacak
                q.o = paired.map(p => p.text);
                
                // Cari posisi baru dari teks jawaban benar yang sudah disimpan
                q.a = q.o.indexOf(correctAnswerText);
            });

            // 4. Reset state
            currentIndex = 0;
            score = 0;
            isAnswered = false;
            document.getElementById('resultArea').style.display = 'none';
            document.getElementById('quizArea').style.display = 'block';
            document.getElementById('roundInfo').textContent = `🎯 Putaran ke-${roundCounter}`;
            roundCounter++;

            // Animasi masuk kartu
            anime({
                targets: '.quiz-card',
                scale: [0.92, 1],
                opacity: [0, 1],
                duration: 700,
                easing: 'easeOutQuad'
            });

            renderQuestion();
        }

        function renderQuestion() {
            isAnswered = false;
            const q = currentRoundQuestions[currentIndex];
            document.getElementById('questionText').textContent = q.q;
            document.getElementById('counterText').textContent = `${currentIndex + 1} / ${QUESTIONS_PER_ROUND}`;
            document.getElementById('scoreDisplay').textContent = `${score}/${QUESTIONS_PER_ROUND}`;
            document.getElementById('nextBtn').style.display = 'none';

            // Animasi Progress Bar
            const progress = ((currentIndex + 1) / QUESTIONS_PER_ROUND) * 100;
            anime({
                targets: '#progressBar',
                width: progress + '%',
                duration: 600,
                easing: 'easeInOutQuad'
            });

            // Render Opsi
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            const letters = ['A', 'B', 'C', 'D'];
            q.o.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="letter">${letters[idx]}</span> ${opt}`;
                btn.dataset.index = idx;
                btn.onclick = () => selectAnswer(idx);
                container.appendChild(btn);
            });

            // Anime.js: Animasi Soal (geser dari kiri)
            anime({
                targets: '#questionText',
                opacity: [0, 1],
                translateX: [-25, 0],
                duration: 550,
                easing: 'easeOutCubic'
            });

            // Anime.js: Animasi Opsi (muncul bergantian)
            anime({
                targets: '.option-btn',
                opacity: [0, 1],
                translateY: [25, 0],
                scale: [0.92, 1],
                duration: 450,
                delay: anime.stagger(80),
                easing: 'easeOutQuad'
            });
        }

        function selectAnswer(selected) {
            if (isAnswered) return;
            isAnswered = true;
            const q = currentRoundQuestions[currentIndex];
            const btns = document.querySelectorAll('.option-btn');

            btns.forEach((btn, idx) => {
                btn.disabled = true;
                if (idx === q.a) btn.classList.add('correct');
                if (idx === selected && idx !== q.a) btn.classList.add('wrong');
            });

            // Anime.js Efek Benar/Salah
            const selectedBtn = btns[selected];
            if (selected === q.a) {
                // Jawaban Benar: Bounce + Skor
                anime({
                    targets: selectedBtn,
                    scale: [1, 1.08, 1],
                    duration: 400,
                    easing: 'easeOutQuad'
                });
                score++;
                // Animasi Skor
                anime({
                    targets: '#scoreDisplay',
                    opacity: [1, 0.5, 1],
                    duration: 300,
                    easing: 'easeOutQuad'
                });
            } else {
                // Jawaban Salah: Shake
                anime({
                    targets: selectedBtn,
                    translateX: [-15, 15, -10, 10, -5, 5, 0],
                    duration: 500,
                    easing: 'easeOutQuad'
                });
            }

            document.getElementById('scoreDisplay').textContent = `${score}/${QUESTIONS_PER_ROUND}`;

            if (currentIndex < QUESTIONS_PER_ROUND - 1) {
                document.getElementById('nextBtn').style.display = 'block';
                document.getElementById('nextBtn').textContent = '▶ Pertanyaan Berikutnya';
            } else {
                document.getElementById('nextBtn').style.display = 'block';
                document.getElementById('nextBtn').textContent = '🏁 Lihat Hasil Akhir';
            }
        }

        function showResult() {
            document.getElementById('quizArea').style.display = 'none';
            const resultArea = document.getElementById('resultArea');
            resultArea.style.display = 'block';
            resultArea.style.opacity = 0;

            const total = QUESTIONS_PER_ROUND;
            const pct = Math.round((score / total) * 100);
            let icon, msg, grade;

            if (pct === 100) { icon = '🏆';
                msg = 'Sempurna! Anda Master Geografi sejati!';
                grade = 'A+' } else if (pct >= 80) { icon = '🌟';
                msg = 'Luar biasa! Pengetahuan Anda sangat luas!';
                grade = 'A' } else if (pct >= 60) { icon = '💪';
                msg = 'Bagus! Terus eksplorasi dunia!';
                grade = 'B' } else if (pct >= 40) { icon = '📚';
                msg = 'Jangan menyerah! Baca lebih banyak tentang landmark dunia.';
                grade = 'C' } else { icon = '🌍';
                msg = 'Ayo tingkatkan lagi! Dunia sangat luas untuk dijelajahi.';
                grade = 'D' }

            resultArea.innerHTML = `
                <div class="big-icon">${icon}</div>
                <h2>Kuis Selesai!</h2>
                <div class="final-score">${score} / ${total}</div>
                <p style="color:rgba(255,255,255,0.4); font-weight:700; font-size:14px;">Grade: ${grade}</p>
                <div class="message">${msg}</div>
                <button class="restart-btn" onclick="restartQuiz()">🔄 Ambil 10 Soal Baru</button>
            `;

            // Anime.js Muncul Hasil
            anime({
                targets: resultArea,
                opacity: [0, 1],
                translateY: [30, 0],
                duration: 600,
                easing: 'easeOutQuad'
            });
        }

        function restartQuiz() {
            // Animasi keluar kartu
            anime({
                targets: '.quiz-card',
                scale: [1, 0.95],
                opacity: [1, 0.6],
                duration: 300,
                easing: 'easeOutQuad',
                complete: () => {
                    startNewRound();
                }
            });
        }

        document.getElementById('nextBtn').addEventListener('click', () => {
            currentIndex++;
            if (currentIndex < QUESTIONS_PER_ROUND) {
                renderQuestion();
            } else {
                showResult();
            }
        });

        // ================================================================
        // 🚀 MULAI PUTARAN PERTAMA
        // ================================================================
        startNewRound();

        // ================================================================
        // ✨ ANIME.JS: Background Orbs Bergerak Melayang
        // ================================================================
        anime({
            targets: '.orb-1',
            translateX: [0, 60, 0],
            translateY: [0, -40, 0],
            duration: 12000,
            loop: true,
            easing: 'easeInOutQuad'
        });
        anime({
            targets: '.orb-2',
            translateX: [0, -70, 0],
            translateY: [0, 50, 0],
            duration: 15000,
            loop: true,
            easing: 'easeInOutQuad'
        });
        anime({
            targets: '.orb-3',
            scale: [1, 1.2, 1],
            opacity: [0.2, 0.4, 0.2],
            duration: 8000,
            loop: true,
            easing: 'easeInOutQuad'
        });
    </script>
